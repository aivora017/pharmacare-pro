name: Bug Report
description: Report a defect, regression, or production issue.
title: "[BUG] "
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill all required fields so we can reproduce quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
      placeholder: Billing screen freezes after scanning barcode
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - Blocking / data loss / cannot bill
        - P1 - Major workflow broken
        - P2 - Minor issue / workaround exists
        - P3 - Cosmetic
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include exact click/keyboard sequence.
      placeholder: |
        1. Open Billing
        2. Scan barcode 8901234567890
        3. Press F7
        4. App hangs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Screenshots
      description: Paste stack traces or attach screenshots.

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS + app version + branch/commit.
      placeholder: Windows 11, v0.2.0-beta, commit abc123
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I can reproduce this consistently.
          required: true
